<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Sistem Kasir</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/login.css">
</head>
<body>
  <div class="login-container">
    <h3>Login</h3>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p id="login-message" class="mt-3 text-center"></p>
  </div>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(event) {
      event.preventDefault();
      
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      const msg  = document.getElementById("login-message");
      msg.textContent = "Memproses...";
      msg.style.color = "gray";

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass })
        });

        const result = await res.json();
        if (res.ok && result.success) {
          msg.textContent = "Login berhasil!";
          msg.style.color = "green";
          localStorage.setItem("username", result.username);
          localStorage.setItem("role", result.role);
          localStorage.setItem("id_karyawan", result.id_karyawan); 
          if (result.role === "admin" || result.role === "superadmin")
            window.location.href = "/admin-dashboard";
          else if (result.role === "kasir")
            window.location.href = "/kasir-dashboard"; 
          else {
            msg.textContent = "Role tidak dikenali!";
            msg.style.color = "red";
          }

        } else {
          msg.textContent = result.message || "Username atau password salah!";
          msg.style.color = "red";
        }
      } catch (err) {
        console.error("Login error:", err);
        msg.textContent = "Terjadi kesalahan koneksi atau server!";
        msg.style.color = "red";
      }
    });
  </script>
</body>
</html>

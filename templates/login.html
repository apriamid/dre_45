<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Sistem Kasir</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f5f5;
    }
    .login-container {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
      width: 350px;
    }
    .login-container h3 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h3>Login</h3>
    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="text-center mt-3 text-muted" id="login-message"></p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const messageBox = document.getElementById("login-message");

      messageBox.textContent = "Sedang memproses...";
      messageBox.style.color = "gray";

      try {
        //  backend app.py → endpoint /login
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          messageBox.textContent = "Login berhasil!";
          messageBox.style.color = "green";

          //  Redirect sesuai role 
          if (result.role === "admin" || result.role === "superadmin") {
            window.location.href = "/admin-dashboard";
          } else if (result.role === "kasir") {
            window.location.href = "/kasir-dashboard";
          } else {
            messageBox.textContent = "Role tidak dikenali!";
            messageBox.style.color = "red";
          }
        } else {
          messageBox.textContent = result.message || "Username atau password salah!";
          messageBox.style.color = "red";
        }
      } catch (err) {
        console.error("Login error:", err);
        messageBox.textContent = "Terjadi kesalahan koneksi ke server.";
        messageBox.style.color = "red";
      }
    });
  </script>
</body>
</html>

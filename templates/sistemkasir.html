<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Sistem Kasir - POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.webix.com/edge/webix.css" type="text/css" />
  <script src="https://cdn.webix.com/edge/webix.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    html,body { height:100%; margin:0; font-family:Inter, sans-serif; background:#f3f6f5; }
    .main-layout { display:flex; height:100vh; }
    .sidebar { width:220px; background:#0b615b; color:white; padding:16px; box-sizing:border-box; display:flex; flex-direction:column; justify-content:space-between; }
    .menu-item { margin:8px 0; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:15px; }
    .menu-item:hover { color:#c8e6c9; }
    .brand { font-weight:700; font-size:18px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .content { flex:1; padding:12px; display:flex; flex-direction:column; gap:12px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; background:white; padding:10px 16px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
    .pos-grid { display:flex; gap:12px; height: calc(100% - 70px); }
    .left-panel, .right-panel { background:white; border-radius:8px; padding:12px; box-shadow:0 1px 6px rgba(0,0,0,0.06); display:flex; flex-direction:column; }
    .left-panel { width:45%; }
    .right-panel { flex:1; display:flex; flex-direction:column; }
    .product-list { overflow:auto; gap:8px; display:grid; grid-template-columns: repeat(2, 1fr); grid-auto-rows: minmax(60px, auto); }
    .product-card { padding:8px; border-radius:6px; border:1px solid #eee; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
    .cart-footer { margin-top:auto; }
    .btn-pay { background:#0b615b; color:white; border:none; padding:12px 16px; border-radius:6px; font-weight:700; cursor:pointer; width:100%; }
    .btn-secondary { background:#e0e0e0; border:none; padding:10px; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>

<div class="main-layout">
  <div class="sidebar">
    <div>
      <div class="brand"><i class="fa-solid fa-store"></i> SISTEM KASIR</div>
      <div class="menu-item" onclick="showSection('pos')"><i class="fa-solid fa-cash-register"></i> POS</div>
      <div class="menu-item" onclick="showSection('history')"><i class="fa-solid fa-clock-rotate-left"></i> History</div>
    </div>
    <div style="margin-top:auto;">
      <div class="menu-item" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</div>
    </div>
  </div>

  <div class="content">
    <div class="topbar">
      <h2 id="pageTitle">Point of Sale</h2>
      <div id="userInfo" style="font-weight:600; color:#333;">Kasir</div>
    </div>

    <div id="section-pos" class="pos-grid">
      <div class="left-panel">
        <div style="display:flex; gap:8px;">
          <input id="searchInput" placeholder="Cari produk..." style="flex:1; padding:8px; border-radius:6px; border:1px solid #ddd" oninput="filterProduk()" />
          <button class="btn-secondary" id="btnRefresh">Refresh</button>
        </div>
        <div style="margin-top:8px; font-weight:600">Produk</div>
        <div id="productContainer" class="product-list"></div>
      </div>

      <div class="right-panel">
        <label>No Transaksi</label>
        <input id="trxId" readonly style="padding:8px; border-radius:6px; border:1px solid #ddd; background:#f3f3f3; margin-bottom:8px" />

        <div style="flex:1; overflow:auto;">
          <table id="cartTable" style="width:100%; border-collapse:collapse;">
            <thead><tr style="background:#fafafa;">
              <th>Produk</th><th>Harga</th><th>Qty</th><th>Subtotal</th><th>Aksi</th></tr>
            </thead><tbody id="cartBody"></tbody>
          </table>
        </div>

        <div class="cart-footer">
          <div style="display:flex; gap:8px; align-items:center;">
            <div style="flex:1">
              <div style="color:#777">Total</div>
              <div id="txtTotal" style="font-size:22px; font-weight:800">Rp 0</div>
            </div>
            <div style="width:280px;">
              <input id="inpBayar" placeholder="Bayar" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd; text-align:right" />
              <button class="btn-pay" id="btnPay" style="margin-top:8px;">Bayar</button>
              <div style="margin-top:8px; color:#777; font-size:12px;">Kembalian</div>
              <div id="txtKembali" style="font-size:18px; font-weight:700">Rp 0</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="section-history" style="display:none; flex:1; background:white; border-radius:8px; padding:16px; overflow:auto;">
      <h3>Riwayat Transaksi</h3>
      <table style="width:100%; border-collapse:collapse;">
        <thead><tr style="background:#f5f5f5;"><th>ID</th><th>Tanggal</th><th>Kasir</th><th>Total</th><th>Aksi</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let PRODUCTS=[], CART=[];
function rupiah(v){return new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR'}).format(v||0);}
function numberOnly(v){return parseInt(String(v||'').replace(/[^0-9]/g,''))||0;}
function logout(){localStorage.clear();location.href='/logout';}
function showSection(id){
  document.getElementById("section-pos").style.display=id==='pos'?'flex':'none';
  document.getElementById("section-history").style.display=id==='history'?'block':'none';
  document.getElementById("pageTitle").innerText=id==='pos'?'Point of Sale':'Riwayat Transaksi';
  if(id==='history') loadHistory();
}
document.getElementById("inpBayar").addEventListener("input",e=>{
  e.target.value=e.target.value.replace(/[^0-9]/g,'');updateKembalian();
});
function updateKembalian(){
  const total=CART.reduce((a,b)=>a+b.subtotal,0);
  const bayar=numberOnly(document.getElementById("inpBayar").value);
  document.getElementById("txtKembali").innerText=rupiah(Math.max(0,bayar-total));
}
async function loadProducts(){
  const res=await fetch("/api/penjualan/");
  const j=await res.json(); if(!j.success) return alert("Gagal load produk");
  PRODUCTS=j.data; renderProducts(PRODUCTS);
}
function renderProducts(list){
  const c=document.getElementById("productContainer"); c.innerHTML="";
  list.forEach(p=>{
    const card=document.createElement("div"); card.className="product-card";
    card.innerHTML=`<div><b>${p.nama_produk}</b><br><small>Stok: ${p.stok} | ${p.kategori||''}</small></div><div>${rupiah(p.harga)}</div>`;
    card.onclick=()=>addToCart(p,1);
    c.appendChild(card);
  });
}
function filterProduk(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const f=PRODUCTS.filter(p=>p.nama_produk.toLowerCase().includes(q)||p.kategori.toLowerCase().includes(q));
  renderProducts(f);
}
function addToCart(p,qty=1){
  const kode=p._id; const f=CART.find(i=>i.kode_produk===kode);
  if(f){f.qty+=qty;f.subtotal=f.qty*f.harga;}else CART.push({kode_produk:kode,nama_produk:p.nama_produk,harga:p.harga,qty,subtotal:p.harga*qty});
  renderCart();
}
function renderCart(){
  const b=document.getElementById("cartBody"); b.innerHTML="";
  CART.forEach((c,i)=>{
    b.innerHTML+=`<tr><td>${c.nama_produk}</td><td>${rupiah(c.harga)}</td><td><input value="${c.qty}" data-i="${i}" style="width:50px;text-align:center"></td><td>${rupiah(c.subtotal)}</td><td><button onclick="CART.splice(${i},1);renderCart()">X</button></td></tr>`;
  });
  b.querySelectorAll("input").forEach(inp=>inp.onchange=e=>{const i=e.target.dataset.i;CART[i].qty=numberOnly(e.target.value);CART[i].subtotal=CART[i].qty*CART[i].harga;renderCart();});
  document.getElementById("txtTotal").innerText=rupiah(CART.reduce((a,b)=>a+b.subtotal,0));updateKembalian();
}
async function getNextTrxId(){
  const r=await fetch("/api/penjualan/nextid");const j=await r.json();if(j.success)document.getElementById("trxId").value=j.next_id;
}
async function submitPayment(){
  if(CART.length===0)return alert("Keranjang kosong");
  const bayar=numberOnly(document.getElementById("inpBayar").value);
  const total=CART.reduce((a,b)=>a+b.subtotal,0);
  if(bayar<total)return alert("Pembayaran kurang");
  const payload={uang_diterima:bayar,daftar_item:CART};
  const res=await fetch("/api/penjualan/create",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  const j=await res.json();if(!j.success)return alert(j.message||"Error");
  printReceipt(j.id,CART,j.total,bayar);
  CART=[];renderCart();document.getElementById("inpBayar").value="";getNextTrxId();
}
function printReceipt(id,items,total,bayar){
  const win=window.open("","_blank","width=350,height=600");
  let html=`<h3 style='text-align:center'>Struk Pembelian</h3><hr>ID: ${id}<br>${new Date().toLocaleString()}<hr>`;
  items.forEach(i=>html+=`${i.nama_produk} x${i.qty} = ${rupiah(i.subtotal)}<br>`);
  html+=`<hr>Total: ${rupiah(total)}<br>Bayar: ${rupiah(bayar)}<br>Kembali: ${rupiah(bayar-total)}<hr>Terima kasih!`;
  win.document.write(html);win.print();
}
async function loadHistory(){
  const r=await fetch("/api/penjualan/history");const j=await r.json();if(!j.success)return;
  const b=document.getElementById("historyBody");b.innerHTML="";
  j.data.forEach(h=>{
    const t=new Date(h.tanggal).toLocaleString();
    b.innerHTML+=`<tr><td>${h._id}</td><td>${t}</td><td>${h.id_kasir||'-'}</td><td>${rupiah(h.total)}</td><td><button onclick="lihatStruk('${h._id}')">🧾 Lihat Struk</button></td></tr>`;
  });
}
async function lihatStruk(id){
  const r=await fetch(`/api/penjualan/${id}`);const j=await r.json();if(!j.success)return alert("Struk tidak ditemukan");
  const d=j.data;printReceipt(d._id,d.items,d.total,d.pembayaran.bayar);
}
document.getElementById("btnPay").onclick=submitPayment;
document.getElementById("btnRefresh").onclick=loadProducts;
loadProducts();getNextTrxId();
</script>
</body>
</html>
